<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marco Unificado de Decisión Estratégica</title>
    <style>
        body {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292e;
        }
        pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
        }
        code {
            font-family: "SF Mono", monospace;
        }
        img {
            max-width: 100%;
        }
        .markdown-body {
            box-sizing: border-box;
        }
        @media (max-width: 767px) {
            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <!-- El contenido se cargará desde README.md -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                document.querySelector('.markdown-body').innerHTML = marked.parse(text);
            })
            .catch(err => {
                document.querySelector('.markdown-body').innerHTML = '<p>Error cargando README.md. Asegúrate de que el archivo exista en la raíz.</p>';
                console.error(err);
            });
    </script>
</body>
</html>
